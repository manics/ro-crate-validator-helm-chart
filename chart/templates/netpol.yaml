{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ro-crate-validator.fullname" . }}-validator
  labels:
    {{- include "ro-crate-validator.labels" . | nindent 4 }}
    app.kubernetes.io/component: validator
spec:
  podSelector:
    matchLabels:
      {{- include "ro-crate-validator.labels" . | nindent 6 }}
      app.kubernetes.io/component: validator
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # From anywhere
    - ports:
        - port: {{ .Values.service.port }}

  egress:
    - ports:
        - port: {{ .Values.redis.service.port }}
      to:
        - podSelector:
            matchLabels:
              {{- include "ro-crate-validator.labels" . | nindent 14 }}
              app.kubernetes.io/component: redis

{{- end }}
