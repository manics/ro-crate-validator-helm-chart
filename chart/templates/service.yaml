apiVersion: v1
kind: Service
metadata:
  name: {{ include "ro-crate-validator.fullname" . }}
  labels:
    {{- include "ro-crate-validator.labels" . | nindent 4 }}
    app.kubernetes.io/component: validator
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ro-crate-validator.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: validator
