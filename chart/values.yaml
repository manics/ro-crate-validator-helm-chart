# Default values for ro-crate-validator.

# https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

image:
  repository: ghcr.io/esciencelab/cratey-validator-fivesafes-profile
  # repository: ghcr.io/esciencelab/cratey-validator
  pullPolicy: IfNotPresent
  # Overrides image tag, default is the chart appVersion.
  tag: ""

# https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []

# Optionally override the chart name.
nameOverride: ""
fullnameOverride: ""

flask:
  environment: development

# https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  annotations: {}
  # Optionally override name of the service account to use
  name: ""

# https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# https://kubernetes.io/docs/concepts/services-networking/service/
service:
  type: ClusterIP
  port: 5000

# https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

# Expose the service via gateway-api HTTPRoute https://gateway-api.sigs.k8s.io/guides/
httpRoute:
  enabled: false
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
    - name: gateway
      sectionName: http
      # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
    - chart-example.local
  # List of rules and filters applied.
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers
  #   filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
# TODO: enable these
# livenessProbe:
#   httpGet:
#     path: /
#     port: http
# readinessProbe:
#   httpGet:
#     path: /
#     port: http

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

redis:
  # Use a minimal bundled Redis
  # For production consider setting this to false and running Redis separately
  enabled: true
  image:
    repository: docker.io/library/redis
    pullPolicy: IfNotPresent
    tag: 8.6.4-alpine
  service:
    port: 6379
    type: ClusterIP
  # Set these to if you run your own Redis service e.g. redis://redis:6379/0
  celeryBrokerUrl: ""
  celeryResultBackend: ""

  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  affinity: {}
  tolerations: {}

celery:
  # Use a minimal bundled Celery
  # For production consider setting this to false and running Celery separately
  enabled: true
  # Override the image, default is the same as the main application
  image:
    repository: ""
    pullPolicy: ""
    tag: ""
  command:
    - celery
  args:
    - -A
    - app.celery_worker.celery
    - worker
    - --loglevel=DEBUG
    - -E

  replicaCount: 1
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  affinity: {}
  tolerations: {}

networkPolicy:
  enabled: true
